version: 0.1

component: build

timeoutInSeconds: 1000

shell: bash

steps:
  - type: Command
    name: "Check OS"
    command: |
      cat /etc/os-release

  - type: Command
    name: "Install Java (if not exists)"
    command: |
      java -version || (sudo yum install -y java-11-openjdk-devel || sudo dnf install -y java-11-openjdk-devel)

  - type: Command
    name: "Check Java Version"
    command: |
      java -version

  - type: Command
    name: "Compile Java"
    command: |
      javac Calculator.java

  - type: Command
    name: "Run Program"
    command: |
      java Calculator