version: 0.1

component: build

timeoutInSeconds: 1000

shell: bash

steps:
  - type: Command
    name: "Check Java"
    command: |
      java -version

  - type: Command
    name: "List Files"
    command: |
      ls -l

  - type: Command
    name: "Compile"
    command: |
      javac Calculator.java

  - type: Command
    name: "Run"
    command: |
      java Calculator