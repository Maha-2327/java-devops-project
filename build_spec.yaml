version: 0.1

component: build

timeoutInSeconds: 1000

shell: bash

steps:
  - type: Command
    name: "Install Java"
    command: |
      sudo yum install -y java-11-openjdk-devel

  - type: Command
    name: "Compile Java Program"
    command: |
      javac Calculator.java

  - type: Command
    name: "Run Java Program"
    command: |
      java Calculator